<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h3>Focus,Blur,Input</h3>
      <label for="emailField">Email Id</label>
      <input type="email" id="emailField" placeholder="Enter Email" />
      <p id="message"></p>
    </form>
    <script>
        let input = document.getElementById("emailField")
        let message = document.getElementById("message")

        input.addEventListener("focus",function(){
            message.textContent = "Please Enter a valid Email";
        })

        input.addEventListener("input",function(){
            message.textContent = "Typing: "+ input.value
        })

        input.addEventListener("blur",function(){
            if(!input.value.includes("@")){
                message.textContent = "Invalid Email";
            }
            else{
                message.textContent = "Looks good";
            }
        })

    </script>
  </body>
</html>
